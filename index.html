  <meta name="robots" content="noindex" />
     <style>
    img:invalid, img:-moz-broken { display: none; }
   </style>

  <script>
    document.addEventListener('error', function (e) {
      if (e.target.tagName.toLowerCase() === 'img') {
        e.target.style.display = 'none';
      }
    }, true);
  </script>
 </head>
